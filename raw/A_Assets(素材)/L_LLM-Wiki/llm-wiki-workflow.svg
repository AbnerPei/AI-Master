<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki 工作流</title>
  <desc id="desc">原始资料经过 LLM Agent 增量编译，形成互联 Markdown Wiki，再反哺查询、写作、复盘和 lint。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f6f2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2a44" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6ee1"/>
    </marker>
    <style>
      .title{font:700 54px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#14213d}
      .subtitle{font:400 25px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#536079}
      .h{font:700 30px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#14213d;text-anchor:middle}
      .p{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#536079;text-anchor:middle}
      .small{font:500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7390;text-anchor:middle}
      .code{font:600 19px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#4e5bd5;text-anchor:middle}
      .arrow{stroke:#5b6ee1;stroke-width:6;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .dash{stroke:#9a7bff;stroke-width:4;stroke-dasharray:10 12;fill:none;marker-end:url(#arrow);stroke-linecap:round}
      .node{fill:#ffffff;stroke:#6e7cff;stroke-width:4}
      .link{stroke:#9aa6ff;stroke-width:3;fill:none;opacity:.8}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1400" cy="140" r="150" fill="#dfe7ff" opacity="0.65"/>
  <circle cx="160" cy="760" r="180" fill="#efe4ff" opacity="0.7"/>

  <text x="100" y="105" class="title">LLM Wiki：把资料编译成会复利的知识库</text>
  <text x="104" y="150" class="subtitle">Raw sources → LLM Agent → Interlinked Markdown Wiki → Answers / Writing / Lint</text>

  <!-- Four equal-sized workflow items: x gap = 80, card size = 300 x 370 -->
  <g filter="url(#shadow)">
    <rect x="80" y="230" width="300" height="370" rx="32" fill="url(#card)"/>
    <text x="230" y="292" class="h">1. Raw Sources</text>
    <text x="230" y="336" class="p">文章 / 论文 / 课程</text>
    <text x="230" y="370" class="p">访谈 / 实验 / 笔记</text>
    <g transform="translate(101 420)">
      <rect x="0" y="0" width="74" height="96" rx="10" fill="#eef3ff" stroke="#7f8cff" stroke-width="3"/>
      <rect x="92" y="18" width="74" height="96" rx="10" fill="#f5efff" stroke="#a084ff" stroke-width="3"/>
      <rect x="184" y="-8" width="74" height="96" rx="10" fill="#eefcf7" stroke="#52c7a6" stroke-width="3"/>
      <line x1="14" y1="24" x2="58" y2="24" stroke="#7f8cff" stroke-width="5"/>
      <line x1="14" y1="44" x2="58" y2="44" stroke="#7f8cff" stroke-width="5"/>
      <line x1="106" y1="42" x2="150" y2="42" stroke="#a084ff" stroke-width="5"/>
      <line x1="106" y1="62" x2="150" y2="62" stroke="#a084ff" stroke-width="5"/>
      <line x1="198" y1="16" x2="242" y2="16" stroke="#52c7a6" stroke-width="5"/>
      <line x1="198" y1="36" x2="242" y2="36" stroke="#52c7a6" stroke-width="5"/>
    </g>
    <text x="230" y="563" class="code">raw/ + source-manifest.md</text>
  </g>

  <path class="arrow" d="M405 415 C430 415 435 415 455 415"/>

  <g filter="url(#shadow)">
    <rect x="460" y="230" width="300" height="370" rx="32" fill="url(#card)"/>
    <text x="610" y="292" class="h">2. LLM Agent</text>
    <text x="610" y="336" class="p">阅读、抽取、归并</text>
    <text x="610" y="370" class="p">去重、链接、标注冲突</text>
    <circle cx="610" cy="468" r="76" fill="#eef3ff" stroke="#6e7cff" stroke-width="5"/>
    <circle cx="586" cy="448" r="13" fill="#6e7cff"/>
    <circle cx="634" cy="448" r="13" fill="#6e7cff"/>
    <path d="M570 487 C595 513 626 513 651 487" fill="none" stroke="#6e7cff" stroke-width="7" stroke-linecap="round"/>
    <text x="610" y="563" class="code">ingest / update / query</text>
  </g>

  <path class="arrow" d="M785 415 C810 415 815 415 835 415"/>

  <g filter="url(#shadow)">
    <rect x="840" y="230" width="300" height="370" rx="32" fill="url(#card)"/>
    <text x="990" y="292" class="h">3. Wiki Layer</text>
    <text x="990" y="336" class="p">实体页 / 概念页 / 比较页</text>
    <text x="990" y="370" class="p">查询沉淀 / 操作手册</text>
    <g transform="translate(910 393) scale(0.56)">
      <path class="link" d="M50 30 L150 70 L92 155 L220 145 L180 235 L52 210 Z"/>
      <circle class="node" cx="50" cy="30" r="22"/>
      <circle class="node" cx="150" cy="70" r="22"/>
      <circle class="node" cx="92" cy="155" r="22"/>
      <circle class="node" cx="220" cy="145" r="22"/>
      <circle class="node" cx="180" cy="235" r="22"/>
      <circle class="node" cx="52" cy="210" r="22"/>
    </g>
    <text x="990" y="563" class="code">wiki/index.md + links</text>
  </g>

  <path class="arrow" d="M1165 415 C1190 415 1195 415 1215 415"/>

  <g filter="url(#shadow)">
    <rect x="1220" y="230" width="300" height="370" rx="32" fill="url(#card)"/>
    <text x="1370" y="292" class="h">4. Use</text>
    <text x="1370" y="342" class="p">问答</text>
    <text x="1370" y="377" class="p">写作</text>
    <text x="1370" y="412" class="p">复盘</text>
    <text x="1370" y="447" class="p">Lint</text>
    <rect x="1315" y="501" width="110" height="42" rx="21" fill="#6e7cff"/>
    <text x="1370" y="528" style="font:700 19px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:white;text-anchor:middle">复利</text>
  </g>

  <!-- Feedback loop stays above the footer sentence to avoid overlap. -->
  <path class="dash" d="M990 635 C880 705 610 715 270 650"/>

  <rect x="238" y="780" width="1124" height="48" rx="24" fill="#ffffff" opacity="0.78"/>
  <text x="800" y="811" class="small">关键差异：RAG 是每次从原料重做菜；LLM Wiki 是先把知识编译成可维护的“代码库”。</text>
</svg>
